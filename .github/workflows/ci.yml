name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: delayt_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19.0'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build shared package
      run: npm run build:shared

    - name: Build CLI package
      run: npm run build:cli

    - name: CLI smoke test
      run: |
        node packages/cli/dist/index.js run -u https://httpbin.org/delay/0.1 -n 3 -q --assert-p95=10000

    - name: Test shared package
      run: npm run test:shared

    - name: TypeScript check
      run: npm run typecheck

    - name: ESLint (app)
      run: npm run lint --workspace=app

    - name: Build Next.js app
      run: npm run build:app

    - name: Test app health
      run: |
        cd app
        export DATABASE_URL="postgresql://testuser:testpass@localhost:5432/delayt_test"
        npm start &
        SERVER_PID=$!
        sleep 5
        curl -sf http://localhost:3000/api/health
        curl -sf http://localhost:3000/api
        kill $SERVER_PID

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/delayt_test